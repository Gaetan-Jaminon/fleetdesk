name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a Go TUI application (Bubble Tea) that manages Linux VM fleets over SSH.

            ## Architecture rules
            - Package structure: internal/config/, internal/ssh/, internal/app/, internal/views/
            - internal/ssh/ must NOT import Bubble Tea — it contains pure data-fetching and parsing logic
            - Each view follows the pattern: fetch function → message type → model handler → render function
            - Destructive actions require [Y/n] confirmation prompts

            ## Security rules
            - No hardcoded credentials, keys, or secrets
            - SSH passwords must never be logged, stored, or cached beyond the session
            - User input used in SSH commands must be sanitized — no command injection
            - No secrets in error messages or log output

            ## Review checklist
            - Code correctness and potential bugs
            - Go conventions: error handling, table-driven tests, named return values only when useful
            - Tests exist for new parsers and helpers in ssh/ and config/
            - PR scope matches the PR description — flag unrelated changes

            ## How to report
            - Only flag real issues — not style nitpicks or subjective preferences
            - Use inline comments for specific code issues with a fix suggestion
            - Use a top-level comment for a short summary (approve, request changes, or observations)
            - Rate each issue: 🔴 must fix, 🟡 should fix, 🟢 suggestion
          claude_args: |
            --model claude-sonnet-4-6 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
