name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            - Code correctness and potential bugs
            - Adherence to the internal/ package structure (config/, ssh/, app/, views/)
            - internal/ssh/ must NOT import Bubble Tea
            - Tests exist for new parsers and helpers in ssh/ and config/
            - No scope creep beyond the Linear issue
            - Go conventions (table-driven tests, error handling)
          claude_args: "--model claude-sonnet-4-6"
